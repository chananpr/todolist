<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Icons · Todolist Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="assets/tailwind-config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="assets/site.css" />
<style>
  .tile { transition: all .15s ease-out; }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -18px rgba(37,99,235,.28); border-color: #bfdbfe; }
  .hidden-tile { display: none !important; }
</style>
</head>
<body class="min-h-screen">
<div id="site-nav"></div>

<main class="max-w-7xl mx-auto px-6 py-10 space-y-10">

  <header class="flex items-end justify-between flex-wrap gap-4">
    <div>
      <div class="eyebrow">06 · Iconography</div>
      <h1 class="display text-4xl font-semibold mt-2">Icon gallery</h1>
      <p class="text-slate-600 mt-2 max-w-2xl">
        Library: <code class="bg-slate-100 px-1 rounded">lucide-react</code> — ใช้ได้เฉพาะไอคอนในชุดนี้
      </p>
    </div>
    <input id="q" placeholder="Search… e.g. chart, user, lock"
           class="h-10 w-full md:w-72 rounded-md border border-slate-200 px-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 shadow-soft" />
  </header>

  <section>
    <div class="eyebrow">Navigation & layout</div>
    <div id="g-nav" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

  <section>
    <div class="eyebrow">Actions</div>
    <div id="g-actions" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

  <section>
    <div class="eyebrow">Status & feedback</div>
    <div id="g-status" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

  <section>
    <div class="eyebrow">Data & charts</div>
    <div id="g-data" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

  <section>
    <div class="eyebrow">People & communication</div>
    <div id="g-people" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

  <section>
    <div class="eyebrow">Security</div>
    <div id="g-security" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

  <section>
    <div class="eyebrow">AI & workflow</div>
    <div id="g-ai" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  </section>

</main>

<div id="site-footer"></div>
<script src="assets/site.js"></script>
<script>
  const groups = {
    'g-nav':      ['layout-dashboard','briefcase','users','bar-chart-3','shield-check','brain-circuit','folder','folder-open','list','menu','chevron-left','chevron-right'],
    'g-actions':  ['plus','pencil','trash-2','copy','save','upload','download','search','filter','settings','more-horizontal','x'],
    'g-status':   ['check','check-circle-2','circle-alert','triangle-alert','info','clock','loader','bell','flag','star','zap'],
    'g-data':     ['activity','line-chart','pie-chart','trending-up','trending-down','database','table-2','calendar','kanban','clipboard-list'],
    'g-people':   ['user','user-plus','user-round','mail','message-square','message-circle','at-sign','phone'],
    'g-security': ['lock','unlock','key-round','shield','shield-alert','eye','eye-off'],
    'g-ai':       ['sparkles','wand-2','cpu','bot','workflow','git-branch','rocket','target'],
  };

  function renderTile(name){
    return `
      <button class="tile rounded-xl bg-white border border-slate-100 shadow-soft p-4 flex flex-col items-center gap-2 text-left"
              data-name="${name}" title="copy: <${name}/>"
              onclick="navigator.clipboard && navigator.clipboard.writeText('${name}')">
        <i data-lucide="${name}" class="h-7 w-7 text-primary-700"></i>
        <div class="text-[11px] text-slate-500 font-mono truncate w-full text-center">${name}</div>
      </button>`;
  }

  function render(){
    for (const [id, names] of Object.entries(groups)){
      const el = document.getElementById(id);
      if (!el) continue;
      el.innerHTML = names.map(renderTile).join('');
    }
    if (window.lucide) lucide.createIcons();
  }

  function filter(q){
    q = (q || '').trim().toLowerCase();
    document.querySelectorAll('[data-name]').forEach(el => {
      const match = !q || el.dataset.name.includes(q);
      el.classList.toggle('hidden-tile', !match);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    render();
    document.getElementById('q').addEventListener('input', e => filter(e.target.value));
  });
</script>
</body>
</html>
