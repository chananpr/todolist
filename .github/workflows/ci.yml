name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web — test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck contracts
        run: npm run typecheck -w @taskforge/contracts

      - name: Unit tests (web)
        run: npm run test -w apps/web

      - name: Vite build (web)
        run: npx vite build
        working-directory: apps/web

      # apps/api is intentionally excluded from CI until the dashboard
      # contract exports (DashboardOverview, DashboardBoardLane,
      # DashboardLoadItem) are added to packages/contracts — typecheck
      # fails there on main today.
