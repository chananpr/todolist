name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web — typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Root `postinstall` builds @taskforge/contracts so downstream
        # workspaces can resolve its types.
        run: npm ci

      - name: Typecheck contracts
        run: npm run typecheck -w @taskforge/contracts

      - name: Typecheck web
        run: npm run typecheck -w apps/web

      - name: Unit tests (web)
        run: npm run test -w apps/web

      - name: Vite build (web)
        run: npx vite build
        working-directory: apps/web

  api:
    name: api — typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck api
        run: npm run typecheck -w apps/api

      - name: Unit tests (api)
        run: npm run test -w apps/api
